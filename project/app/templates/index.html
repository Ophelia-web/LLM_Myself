<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalized Dining Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero card">
        <div class="hero-content">
          <p class="eyebrow">Personalized Dining Guide</p>
          <h1>Personalized Dining Guide</h1>
          <p class="subtitle">Find something warm, cozy, and just right for you.</p>
          <div class="hero-stickers" aria-hidden="true">
            <img src="/static/art/sticker-toast.svg" alt="" />
            <img src="/static/art/sticker-coffee.svg" alt="" />
            <img src="/static/art/sticker-bowl.svg" alt="" />
          </div>
        </div>
        <img class="hero-accent" src="/static/art/sticker-bowl.svg" alt="" aria-hidden="true" />
      </section>

      <section class="form-section card">
        <form id="search-form" class="search-form">
          <details id="advanced-settings" class="advanced-settings">
            <summary>Advanced Settings</summary>
            <p class="hint">Keys are stored locally in your browser.</p>
            <div class="advanced-grid">
              <label class="advanced-label">
                Google Maps API Key
                <input
                  type="password"
                  name="googleMapsApiKey"
                  placeholder="Paste your Google Maps API key"
                  autocomplete="off"
                />
              </label>
              <label class="advanced-label">
                Gemini API Key
                <input
                  type="password"
                  name="geminiApiKey"
                  placeholder="Paste your Gemini API key"
                  autocomplete="off"
                />
              </label>
            </div>
          </details>

          <div class="input-grid">
            <label>
              <span class="label-title">
                <img src="/static/art/icon-map.svg" alt="" aria-hidden="true" />
                Where are you?
              </span>
              <input type="text" name="zipCode" placeholder="e.g. 10025" required />
            </label>

            <label>
              <span class="label-title">
                <img src="/static/art/icon-food.svg" alt="" aria-hidden="true" />
                What are you craving?
              </span>
              <input type="text" name="cuisine" placeholder="e.g. Sushi" required />
            </label>

            <label>
              <span class="label-title">
                <img src="/static/art/icon-people.svg" alt="" aria-hidden="true" />
                Number of people
              </span>
              <input type="number" name="partySize" min="1" max="20" value="2" required />
            </label>

            <label>
              <span class="label-title">
                <img src="/static/art/icon-budget.svg" alt="" aria-hidden="true" />
                Budget range
              </span>
              <select name="budget" required>
                <option value="1">1 — Inexpensive</option>
                <option value="2" selected>2 — Moderate</option>
                <option value="3">3 — Expensive</option>
                <option value="4">4 — Very Expensive</option>
              </select>
            </label>
          </div>

          <button type="submit">Find Restaurants</button>
        </form>
      </section>

      <section class="results-section">
        <div id="status" class="status" aria-live="polite"></div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Recommendation Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Restaurant Recommendation Demo</h1>
      <p class="subtitle">Enter your preferences and get top 3 suggestions.</p>

      <form id="search-form" class="search-form">
        <label>
          ZIP Code
          <input type="text" name="zipCode" placeholder="e.g. 94103" required />
        </label>

        <label>
          Cuisine
          <input type="text" name="cuisine" placeholder="e.g. Japanese" required />
        </label>

        <label>
          Party Size
          <input type="number" name="partySize" min="1" max="20" value="2" required />
        </label>

        <label>
          Budget
          <select name="budget" required>
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="luxury">Luxury</option>
          </select>
        </label>

        <button type="submit">Find Restaurants</button>
      </form>

      <section id="status" class="status"></section>
      <section id="results" class="results"></section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>

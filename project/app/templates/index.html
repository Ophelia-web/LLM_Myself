<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalized Dining Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero card">
        <div class="hero-content">
          <p class="eyebrow">Personalized Dining Guide</p>
          <h1>Personalized Dining Guide</h1>
          <p class="subtitle">Explore a lightweight LLM + RAG + VLM restaurant intelligence demo.</p>
          <div class="hero-stickers" aria-hidden="true">
            <img src="https://images.unsplash.com/vector-1767592996701-4408079ed440?fm=jpg&q=70&w=500&auto=format&fit=crop" alt="" />
            <img src="https://images.unsplash.com/vector-1754199100419-181232bd1bb9?fm=jpg&q=70&w=500&auto=format&fit=crop" alt="" />
          </div>
        </div>
        <img
          class="hero-accent"
          src="https://images.unsplash.com/vector-1767592996701-4408079ed440?fm=jpg&q=70&w=900&auto=format&fit=crop"
          alt="Watercolor food illustration"
        />
      </section>

      <section class="form-section card">
        <form id="search-form" class="search-form">
          <details id="advanced-settings" class="advanced-settings">
            <summary>Advanced Settings</summary>
            <p class="hint">Keys are stored locally in your browser.</p>
            <div class="advanced-grid">
              <label class="advanced-label">
                Google Maps API Key
                <input
                  type="password"
                  name="googleMapsApiKey"
                  placeholder="Paste your Google Maps API key"
                  autocomplete="off"
                />
              </label>
              <label class="advanced-label">
                Gemini API Key
                <input
                  type="password"
                  name="geminiApiKey"
                  placeholder="Paste your Gemini API key"
                  autocomplete="off"
                />
              </label>
            </div>
          </details>

          <div class="input-grid">
            <label>
              <span class="label-title">Where are you?</span>
              <input type="text" name="zipCode" placeholder="e.g. 10025" required />
            </label>

            <label>
              <span class="label-title">What are you craving?</span>
              <input type="text" name="cuisine" placeholder="e.g. Sushi" required />
            </label>

            <label>
              <span class="label-title">Number of people</span>
              <input type="number" name="partySize" min="1" max="20" value="2" required />
            </label>

            <label>
              <span class="label-title">Budget range</span>
              <select name="budget" required>
                <option value="low">Low ($)</option>
                <option value="medium" selected>Medium ($$)</option>
                <option value="high">High ($$$)</option>
                <option value="luxury">Luxury ($$$$)</option>
              </select>
            </label>
          </div>

          <button type="submit" class="submit-btn">Find Restaurants</button>
        </form>
      </section>

      <section class="results-section">
        <div id="status" class="status" aria-live="polite"></div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>

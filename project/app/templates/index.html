<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Recommendation Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <div>
          <p class="eyebrow">Personalized Dining Guide</p>
          <h1>Restaurant Recommendation Demo</h1>
          <p class="subtitle">
            Use your own API keys and get top 3 recommendations tailored to your plan.
          </p>
        </div>
        <div class="food-emoji" aria-hidden="true">🥞 🥐 🧇 ☕ 🍰</div>
      </header>

      <form id="search-form" class="search-form">
        <fieldset class="api-section">
          <legend>Your API Keys</legend>
          <p class="hint">
            Keys stay in your browser via localStorage and are sent only with this request.
          </p>
          <label>
            Google Maps API Key
            <input
              type="password"
              name="googleMapsApiKey"
              placeholder="Paste your Google Maps API key"
              autocomplete="off"
              required
            />
          </label>
          <label>
            Gemini API Key
            <input
              type="password"
              name="geminiApiKey"
              placeholder="Paste your Gemini API key"
              autocomplete="off"
              required
            />
          </label>
        </fieldset>

        <label>
          ZIP Code
          <input type="text" name="zipCode" placeholder="e.g. 94103" required />
        </label>

        <label>
          Cuisine
          <input type="text" name="cuisine" placeholder="e.g. Japanese" required />
        </label>

        <label>
          Party Size
          <input type="number" name="partySize" min="1" max="20" value="2" required />
        </label>

        <label>
          Budget
          <select name="budget" required>
            <option value="1">1 — Inexpensive</option>
            <option value="2" selected>2 — Moderate</option>
            <option value="3">3 — Expensive</option>
            <option value="4">4 — Very Expensive</option>
          </select>
        </label>

        <button type="submit">Find Restaurants</button>
      </form>

      <section id="status" class="status"></section>
      <section id="results" class="results"></section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
